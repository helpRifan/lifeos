name: iOS Build & Deploy to TestFlight

on:
  push:
    tags:
      - 'ios-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., ios-v1.0.0)'
        required: true
        type: string
      changelog:
        description: 'Changelog for TestFlight'
        required: false
        type: string

env:
  NODE_VERSION: '20'
  APP_ID: 'com.lifeos.app'
  SCHEME: 'App'
  CONFIGURATION: 'Release'

permissions:
  contents: read
  id-token: write

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-14
    timeout-minutes: 60
    outputs:
      ipa_path: ${{ steps.upload-ipa.outputs.ipa_path }}
      build_version: ${{ steps.set-version.outputs.build_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Build Web App
        working-directory: ./app
        run: npm run build

      - name: Install CocoaPods
        run: sudo gem install cocoapods -v 1.15.2

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          cache-version: 1
          working-directory: ./app/ios/App

      - name: Add iOS Platform (Capacitor)
        working-directory: ./app
        run: npx cap add ios

      - name: Sync Capacitor
        working-directory: ./app
        run: npx cap sync ios

      - name: Set Build Version
        id: set-version
        working-directory: ./app/ios/App
        run: |
          BUILD_NUMBER="${GITHUB_REF_NAME#ios-v}"
          BUILD_NUMBER="${BUILD_NUMBER:-${GITHUB_RUN_NUMBER}}"
          echo "build_version=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Setting build number to $BUILD_NUMBER"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $BUILD_NUMBER" App/Info.plist

      - name: Configure Code Signing
        run: |
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 -d > /tmp/certificate.p12
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" build.keychain
          rm /tmp/certificate.p12

      - name: Set Up Provisioning Profile
        run: |
          echo "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build and Archive
        working-directory: ./app/ios/App
        run: |
          xcodebuild clean archive \
            -scheme "${{ env.SCHEME }}" \
            -configuration "${{ env.CONFIGURATION }}" \
            -archivePath "./build/App.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISION_PROFILE_NAME }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      - name: Export IPA
        working-directory: ./app/ios/App
        run: |
          xcodebuild -exportArchive \
            -archivePath "./build/App.xcarchive" \
            -exportPath "./build/export" \
            -exportOptionsPlist "./ExportOptions.plist"

      - name: Upload IPA Artifact
        id: upload-ipa
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ./app/ios/App/build/export/App.ipa
          retention-days: 30

  upload-testflight:
    name: Upload to TestFlight
    needs: build-ios
    runs-on: macos-14
    timeout-minutes: 30
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-app
          path: ./build

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ./app/ios/App

      - name: Install Fastlane
        working-directory: ./app/ios/App
        run: bundle install

      - name: Upload to TestFlight
        working-directory: ./app/ios/App
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          bundle exec fastlane upload_testflight ipa:"./build/App.ipa" changelog:"${{ github.event.inputs.changelog || 'Build from GitHub Actions' }}"